<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豊田少年少女発明クラブ｜認証システム</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="shortcut icon" href="assets/icon/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="container">
        <div class="info">
            <h1>豊田少年少女発明クラブ</h1><span>ログイン・新規登録フォーム</span>
        </div>
    </div>
    <div class="form container">
        <div class="thumbnail"><img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/169963/hat.svg" /></div>
        <form onsubmit="history.back(); return false;" class="info">
            <h1>400</h1>
            <input type="text" placeholder="message" id="message" disabled />
            <input type="text" placeholder="nextStep" id="nextStep" disabled />
            <input type="text" placeholder=data.now(); id="nowDate" disabled />
            <button onclick="history.back();">＜　前のページに戻る</button>
        </form>
    </div>
    <video id="video" autoplay="autoplay" loop="loop" poster="polina.jpg">
        <source src="http://andytran.me/A%20peaceful%20nature%20timelapse%20video.mp4" type="video/mp4" />
    </video>
    <script>
        const nowDateElement = document.getElementById('nowDate');
        nowDateElement.placeholder = "発生時刻：" + new Date().toLocaleString();
        const messageElement = document.getElementById('message');
        messageElement.placeholder = "エラー：不正なリクエストです";
        const nextStepElement = document.getElementById('nextStep');
        nextStepElement.placeholder = "次のステップ：もう一度行ってください";
    </script>
</body>

</html>
